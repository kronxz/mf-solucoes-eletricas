<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Energia Solar</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* MENU */
header{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(2,6,23,0.9);
backdrop-filter: blur(10px);
z-index:999;
}

.logo img{
height:50px;
}

nav a{
margin:0 15px;
color:white;
text-decoration:none;
}

/* HERO COM SUA IMAGEM */
.hero{
height:100vh;
background:url('imagens/fundo.jpg') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(2,6,23,0.8);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:48px;
}

.btn{
background:#2563eb;
padding:15px 30px;
border-radius:8px;
text-decoration:none;
color:white;
display:inline-block;
margin-top:20px;
}

/* SEÇÕES */
.section{
padding:100px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#111827;
margin:10px;
padding:30px;
border-radius:12px;
width:250px;
}

/* GALERIA REAL */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.gallery img{
width:300px;
margin:10px;
border-radius:10px;
}

/* MAPA */
.map{
width:100%;
height:400px;
border:0;
}

/* WHATS */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:15px;
border-radius:50%;
}

/* ESPAÇO */
.spacer{
height:80px;
}

</style>
</head>

<body>

<header>
<div class="logo">
<img src="imagens/logo.png">
</div>

<nav>
<a href="#">Início</a>
<a href="#servicos">Serviços</a>
<a href="#projetos">Projetos</a>
<a href="#contato">Contato</a>
</nav>
</header>

<div class="spacer"></div>

<section class="hero">
<div class="hero-content">
<h1>Reduza sua conta de luz em até 95%</h1>
<p>Energia solar com economia real</p>

<a class="btn" href="https://wa.me/5521972381004">
Solicitar orçamento
</a>
</div>
</section>

<section class="section" id="servicos">
<h2>Por que escolher a MF?</h2>

<div class="cards">
<div class="card">Alta qualidade</div>
<div class="card">Economia garantida</div>
<div class="card">Valorização do imóvel</div>
<div class="card">Retorno rápido</div>
</div>
</section>

<section class="section" id="projetos">
<h2>Projetos Reais</h2>

<div class="gallery">
<img src="imagens/obra1.jpg">
<img src="imagens/obra2.jpg">
<img src="imagens/obra3.jpg">
<img src="imagens/obra4.jpg">
</div>
</section>

<section class="section" id="contato">
<h2>Atendemos em Maricá e região</h2>

<iframe class="map"
src="https://www.google.com/maps?q=Maricá,RJ&output=embed">
</iframe>

<br><br>

<a class="btn" href="https://wa.me/5521972381004">
Falar no WhatsApp
</a>
</section>

<div class="whatsapp">
<a href="https://wa.me/5521972381004">💬</a>
</div>

</body>
</html>
