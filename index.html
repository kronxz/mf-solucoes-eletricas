<!DOCTYPE html>
<html lang="pt-br">
<head>

<title>MF Energia Solar</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* MENU */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#020617;
}

.logo {
  display:flex;
  align-items:center;
}

.logo img {
  height:40px;
  margin-right:10px;
}

nav a {
  margin:0 15px;
  color:white;
  text-decoration:none;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
  background:linear-gradient(180deg,#020617,#0b1220);
}

.hero h1 {
  font-size:42px;
}

.btn {
  background:#3b82f6;
  padding:15px 30px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  display:inline-block;
  margin-top:20px;
}

/* SECTIONS */
.section {
  padding:80px 20px;
  text-align:center;
}

.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:#111827;
  margin:10px;
  padding:25px;
  border-radius:12px;
  width:260px;
  transition:0.3s;
}

.card:hover {
  background:#1e293b;
  transform:translateY(-5px);
}

/* GALLERY */
.gallery {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.gallery img {
  width:250px;
  margin:10px;
  border-radius:10px;
}

/* MAP */
.map {
  width:100%;
  height:400px;
  margin-top:40px;
}

/* WHATS */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:15px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>
  <div class="logo">

    <a href="#servicos">Serviços</a>

    <img src="https://images.unsplash.com/photo-1592833159155-c62df1b65634">
